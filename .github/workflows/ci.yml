name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['11', '12', '13']
        dependency-version: [prefer-stable, prefer-lowest]
        exclude:
          # Laravel 11 supports PHP 8.2 - 8.4
          - php: '8.5'
            laravel: '11'
          # Laravel 13 supports PHP 8.3 - 8.5
          - php: '8.2'
            laravel: '13'
    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.dependency-version }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, gd, exif, fileinfo
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ matrix.dependency-version }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ matrix.dependency-version }}-

      - name: Install Laravel ${{ matrix.laravel }}
        run: |
          composer require "illuminate/contracts:^${{ matrix.laravel }}.0" --no-update --no-interaction
          composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction --no-progress

      - name: Run tests
        if: matrix.php == '8.5' && matrix.laravel == '13' && matrix.dependency-version == 'prefer-stable'
        run: vendor/bin/pest

      - name: Run Pint
        if: matrix.php == '8.5' && matrix.laravel == '13' && matrix.dependency-version == 'prefer-stable'
        run: vendor/bin/pint

      - name: Commit code style fixes
        if: matrix.php == '8.5' && matrix.laravel == '13' && matrix.dependency-version == 'prefer-stable'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Fix code style'

      - name: Run PHPStan
        if: matrix.php == '8.5' && matrix.laravel == '13' && matrix.dependency-version == 'prefer-stable'
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G